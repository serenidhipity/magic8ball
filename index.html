<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic 8-Ball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@400;700&family=Unica+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">ask the ball</h1>
        
        <div id="ball" class="ball">
            <div class="outer-ring">
                <div class="inner-window" id="window">
                    <div id="answer" class="answer">8</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="shake-btn" class="btn">Shake the Ball</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
